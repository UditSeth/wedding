<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0f2a4a" />
<title>Garima &amp; Sagar — 30th &amp; 31st August 2026</title>
<!--
  HOME / INVITATION page for the wedding Command Centre.  ✦ Royal edition ✦
  The fancy landing page guests see first. Sister to rsvp.html / travel.html —
  SAME deployed Apps Script Web App (WebApp.gs), SAME API_URL. It is PUBLIC by
  design: it carries no gated data (no roster, RSVP, secret or phone), so it
  works with OR without a ?family=<uuid> in the link. With a family it greets
  them by name; without one it shows a generic royal welcome.

  ALL copy is configured in the "Website Content" tab (key -> value); photos, the
  invitation video and the venue-map link come from the "Invite Resources" tab
  (a photo = Resource Name starting "Photo"; the video = name containing "video";
  the map = "Venue location / map"). Nothing here is hard-coded — reword the sheet,
  not the file.

  ONE thing to configure: set API_URL below to your deployed …/exec URL (the SAME
  deployment as rsvp.html). Host this single file; set Config → HOME_PAGE_URL and
  share links of the form  https://your-home-page/?family=<uuid>
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Jost:wght@300;400;500;600&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0f2a4a;          /* deep royal navy   */
    --navy2:#14365e;
    --ink:#233a54;           /* body text on cream */
    --ink-soft:#5f708a;
    --gold:#b8912f;          /* rich gold         */
    --gold2:#d8b355;         /* light gold        */
    --gold-soft:#eadfbf;
    --cream:#fbf5e9;         /* warm paper        */
    --cream2:#f4e9d3;
    --wine:#8e2b52;          /* accent rose-wine  */
    --teal:#1f7a6d;          /* accent teal       */
    --line:rgba(184,145,47,.38);
    --shadow:0 26px 70px -34px rgba(15,42,74,.55);
    --serif:"Cormorant Garamond",Georgia,serif;
    --display:"Playfair Display",Georgia,serif;
    --deva:"Tiro Devanagari Hindi","Cormorant Garamond",serif;
    --sans:"Jost",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }
  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0; color:var(--ink); font-family:var(--sans); line-height:1.65;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    background:var(--cream);
    background-image:
      radial-gradient(1100px 640px at 8% -6%, rgba(184,145,47,.10), transparent 60%),
      radial-gradient(1000px 620px at 110% 4%, rgba(31,122,109,.08), transparent 58%),
      radial-gradient(900px 900px at 50% 118%, rgba(142,43,82,.07), transparent 60%);
    min-height:100vh; overflow-x:hidden;
  }
  a{ color:inherit; }
  img{ max-width:100%; display:block; }

  /* ---------- decorative gold particles (petals/stars) ---------- */
  .petals{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .petal{ position:absolute; top:-8vh; font-size:16px; opacity:0; color:var(--gold2);
          animation:fall linear infinite; filter:drop-shadow(0 1px 1px rgba(0,0,0,.08)); }
  @keyframes fall{
    0%{ transform:translateY(-10vh) rotate(0deg); opacity:0; }
    12%{ opacity:.55; }
    88%{ opacity:.45; }
    100%{ transform:translateY(114vh) rotate(300deg); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce){
    .petal{ display:none; }
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; }
    html{ scroll-behavior:auto; }
  }

  /* ---------- shared layout ---------- */
  .wrap{ position:relative; z-index:1; }
  section{ position:relative; }
  .inner{ max-width:1040px; margin:0 auto; padding:0 22px; }
  .narrow{ max-width:760px; }

  /* reveal-on-scroll */
  .reveal{ opacity:0; transform:translateY(26px); transition:opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.in{ opacity:1; transform:none; }
  .reveal.d1{ transition-delay:.08s; } .reveal.d2{ transition-delay:.16s; }
  .reveal.d3{ transition-delay:.24s; } .reveal.d4{ transition-delay:.32s; }

  /* gold ornament divider */
  .orn{ display:flex; align-items:center; justify-content:center; gap:14px; margin:6px auto 0; color:var(--gold); }
  .orn::before,.orn::after{ content:""; height:1px; width:min(120px,22vw);
    background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  .orn span{ font-size:15px; letter-spacing:.3em; }
  .eyebrow{ font-family:var(--sans); font-weight:500; letter-spacing:.34em; text-transform:uppercase;
    font-size:12.5px; color:var(--gold); }
  h2.section-title{ font-family:var(--display); font-weight:600; color:var(--navy);
    font-size:clamp(26px,4.6vw,40px); margin:.35em 0 .15em; text-align:center; letter-spacing:.01em; }
  .section-sub{ text-align:center; color:var(--ink-soft); font-family:var(--serif);
    font-size:clamp(16px,2.2vw,19px); max-width:620px; margin:0 auto 14px; }
  .deva{ font-family:var(--deva); }

  /* =====================================================================
     HERO
  ===================================================================== */
  header.hero{
    position:relative; min-height:100svh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:64px 20px 40px; overflow:hidden;
    color:var(--cream);
    background:
      radial-gradient(120% 90% at 50% -10%, rgba(216,179,85,.16), transparent 55%),
      linear-gradient(165deg,#0c2340 0%, #12315a 46%, #0f2a4a 100%);
  }
  /* filigree arch frame drawn in SVG, faint gold */
  .arch{ position:absolute; inset:0; z-index:0; pointer-events:none;
         display:flex; align-items:flex-start; justify-content:center; opacity:.5; }
  .arch svg{ width:min(720px,92vw); height:auto; margin-top:14px; }
  .hero-inner{ position:relative; z-index:2; max-width:760px; }
  .ganesha{ width:74px; height:74px; margin:0 auto 6px; color:var(--gold2);
            filter:drop-shadow(0 6px 16px rgba(0,0,0,.35)); animation:glow 5s ease-in-out infinite; }
  @keyframes glow{ 0%,100%{ filter:drop-shadow(0 6px 16px rgba(0,0,0,.35)); }
                   50%{ filter:drop-shadow(0 6px 22px rgba(216,179,85,.55)); } }
  .blessing{ font-family:var(--serif); letter-spacing:.24em; text-transform:uppercase;
    font-size:13px; color:var(--gold2); margin:2px 0 4px; }
  .hero-deva{ font-family:var(--deva); color:var(--gold-soft); font-size:clamp(18px,3vw,24px);
    letter-spacing:.06em; opacity:.9; margin-bottom:4px; }
  .names{ font-family:var(--display); font-weight:700; line-height:1.02;
    font-size:clamp(52px,13vw,116px); margin:6px 0; color:#fff;
    text-shadow:0 2px 30px rgba(216,179,85,.28); }
  .names .amp{ display:block; font-family:var(--serif); font-style:italic; font-weight:500;
    color:var(--gold2); font-size:.5em; margin:-.04em 0; }
  .tagline{ font-family:var(--serif); font-style:italic; font-size:clamp(17px,3vw,23px);
    color:var(--gold-soft); margin:4px auto 18px; }
  .hero-meta{ display:flex; gap:12px 26px; flex-wrap:wrap; align-items:center; justify-content:center;
    font-family:var(--sans); letter-spacing:.06em; color:var(--cream); font-size:clamp(13.5px,2.2vw,16px); }
  .hero-meta b{ color:var(--gold2); font-weight:600; }
  .hero-meta .dot{ width:5px; height:5px; border-radius:50%; background:var(--gold); opacity:.7; }
  .greet{ margin:16px auto 0; font-family:var(--serif); font-size:clamp(16px,2.6vw,20px);
    color:#fff; background:rgba(255,255,255,.08); border:1px solid rgba(216,179,85,.4);
    padding:8px 20px; border-radius:999px; backdrop-filter:blur(3px); }
  .greet b{ color:var(--gold2); }

  /* countdown */
  .countdown{ display:flex; gap:10px; justify-content:center; margin:22px auto 6px; flex-wrap:wrap; }
  .cd-box{ min-width:70px; padding:10px 12px; border-radius:14px;
    background:rgba(255,255,255,.07); border:1px solid rgba(216,179,85,.35); }
  .cd-num{ font-family:var(--display); font-size:clamp(22px,5vw,34px); font-weight:600; color:#fff; line-height:1; }
  .cd-lbl{ font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold2); margin-top:5px; }
  .cd-done{ font-family:var(--serif); font-style:italic; font-size:20px; color:var(--gold2); }

  .scroll-hint{ position:absolute; bottom:16px; left:50%; transform:translateX(-50%); z-index:2;
    color:var(--gold2); font-size:12px; letter-spacing:.22em; text-transform:uppercase; opacity:.85;
    display:flex; flex-direction:column; align-items:center; gap:6px; }
  .scroll-hint .chev{ width:22px; height:22px; animation:bob 1.8s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(7px); } }

  /* =====================================================================
     PAPER SECTIONS (cream cards on the cream page, framed in gold)
  ===================================================================== */
  .band{ padding:clamp(52px,9vw,96px) 0; }
  .paper{ position:relative; background:linear-gradient(180deg,#fffaf0, var(--cream));
    border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow);
    padding:clamp(28px,5vw,52px); overflow:hidden; }
  .paper::before{ /* corner filigree */
    content:""; position:absolute; inset:10px; border:1px solid rgba(184,145,47,.22);
    border-radius:16px; pointer-events:none; }
  .corner{ position:absolute; width:54px; height:54px; color:var(--gold); opacity:.55; z-index:1; }
  .corner.tl{ top:8px; left:8px; } .corner.tr{ top:8px; right:8px; transform:scaleX(-1); }
  .corner.bl{ bottom:8px; left:8px; transform:scaleY(-1); }
  .corner.br{ bottom:8px; right:8px; transform:scale(-1,-1); }

  /* welcome */
  .welcome p{ font-family:var(--serif); font-size:clamp(17px,2.6vw,21px); color:var(--ink);
    text-align:center; margin:0 auto 14px; max-width:640px; }
  .welcome .quote{ font-style:italic; color:var(--navy); font-size:clamp(18px,3vw,24px);
    border-top:1px solid var(--line); border-bottom:1px solid var(--line);
    padding:18px 8px; margin-top:22px; position:relative; }
  .welcome .quote::before{ content:"❝"; color:var(--gold); font-size:34px; display:block; margin-bottom:-6px; }
  .welcome .whenwhere{ display:flex; gap:10px 34px; justify-content:center; flex-wrap:wrap;
    margin-top:22px; font-family:var(--sans); letter-spacing:.05em; color:var(--navy); }
  .welcome .whenwhere b{ color:var(--gold); }

  /* timeline */
  .timeline{ max-width:720px; margin:8px auto 0; position:relative; }
  .tl-item{ display:grid; grid-template-columns:56px 1fr; gap:16px; align-items:center;
    padding:14px 0; border-bottom:1px dashed var(--line); }
  .tl-item:last-child{ border-bottom:0; }
  .tl-ic{ width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:24px; color:#fff; box-shadow:0 8px 20px -8px rgba(15,42,74,.5); }
  .tl-c0{ background:linear-gradient(135deg,#d8b355,#b8912f); }
  .tl-c1{ background:linear-gradient(135deg,#2a5f88,#0f2a4a); }
  .tl-c2{ background:linear-gradient(135deg,#a83a63,#7a2145); }
  .tl-c3{ background:linear-gradient(135deg,#2b8f7f,#166357); }
  .tl-c4{ background:linear-gradient(135deg,#c98a2f,#9a5f16); }
  .tl-body .tl-name{ font-family:var(--display); font-weight:600; color:var(--navy);
    font-size:clamp(18px,3vw,23px); }
  .tl-when{ display:flex; gap:8px 16px; flex-wrap:wrap; color:var(--ink-soft);
    font-family:var(--sans); font-size:14.5px; margin-top:2px; }
  .tl-when b{ color:var(--gold); font-weight:600; }
  .cal-btn{ margin-left:auto; }

  /* gallery */
  .gallery{ column-count:3; column-gap:14px; margin-top:8px; }
  @media (max-width:820px){ .gallery{ column-count:2; } }
  @media (max-width:460px){ .gallery{ column-count:1; } }
  .gitem{ break-inside:avoid; margin:0 0 14px; border-radius:14px; overflow:hidden;
    border:1px solid var(--line); box-shadow:0 12px 30px -18px rgba(15,42,74,.5);
    background:var(--cream2); cursor:zoom-in; position:relative; }
  .gitem img{ width:100%; height:auto; transition:transform .6s ease; background:var(--cream2); }
  .gitem:hover img{ transform:scale(1.05); }

  /* video */
  .video-wrap{ max-width:760px; margin:10px auto 0; border-radius:16px; overflow:hidden;
    border:1px solid var(--line); box-shadow:var(--shadow); aspect-ratio:16/9; background:#000; }
  .video-wrap iframe, .video-wrap video{ width:100%; height:100%; border:0; display:block; }

  /* Q & A accordion */
  .qa{ max-width:760px; margin:6px auto 0; }
  .qa-item{ border:1px solid var(--line); border-radius:14px; background:#fffaf0;
    margin-bottom:12px; overflow:hidden; }
  .qa-q{ width:100%; text-align:left; background:none; border:0; cursor:pointer;
    font-family:var(--display); font-weight:600; color:var(--navy); font-size:clamp(16px,2.6vw,20px);
    padding:16px 48px 16px 20px; position:relative; }
  .qa-q::after{ content:"+"; position:absolute; right:18px; top:50%; transform:translateY(-50%);
    color:var(--gold); font-size:24px; font-weight:400; transition:transform .3s ease; }
  .qa-item.open .qa-q::after{ content:"–"; }
  .qa-a{ max-height:0; overflow:hidden; transition:max-height .4s ease, padding .4s ease;
    padding:0 20px; color:var(--ink); font-family:var(--serif); font-size:clamp(16px,2.4vw,18.5px); }
  .qa-item.open .qa-a{ padding:0 20px 18px; }

  /* contact */
  .contacts{ display:flex; gap:18px; flex-wrap:wrap; justify-content:center; margin-top:10px; }
  .card{ background:#fffaf0; border:1px solid var(--line); border-radius:16px;
    padding:22px 26px; text-align:center; min-width:230px; box-shadow:0 14px 34px -22px rgba(15,42,74,.5); }
  .card .cname{ font-family:var(--display); font-weight:600; color:var(--navy); font-size:20px; }
  .card .crole{ color:var(--ink-soft); font-family:var(--serif); font-style:italic; margin-bottom:12px; }
  .card .cbtns{ display:flex; gap:10px; justify-content:center; }
  .chip{ display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:999px;
    text-decoration:none; font-size:14px; font-weight:500; letter-spacing:.02em;
    border:1px solid var(--line); color:var(--navy); background:var(--cream); transition:all .2s ease; }
  .chip:hover{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .chip svg{ width:16px; height:16px; }

  /* CTA + closing */
  .cta-band{ text-align:center; }
  .btnrow{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:22px; }
  .btn{ display:inline-flex; align-items:center; gap:10px; text-decoration:none; cursor:pointer;
    font-family:var(--sans); font-weight:600; letter-spacing:.06em; font-size:15px;
    padding:15px 30px; border-radius:999px; border:1px solid var(--gold); transition:all .25s ease; }
  .btn-primary{ background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#3a2b08;
    box-shadow:0 14px 34px -14px rgba(184,145,47,.8); }
  .btn-primary:hover{ transform:translateY(-2px); box-shadow:0 18px 40px -14px rgba(184,145,47,.9); }
  .btn-ghost{ background:transparent; color:var(--navy); }
  .btn-ghost:hover{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .btn svg{ width:18px; height:18px; }
  .closing{ text-align:center; }
  .closing .msg-q{ font-family:var(--serif); font-style:italic; color:var(--navy);
    font-size:clamp(19px,3.4vw,27px); max-width:660px; margin:0 auto; line-height:1.55; }

  footer.foot{ text-align:center; color:var(--ink-soft); padding:40px 20px 54px;
    font-family:var(--serif); font-style:italic; }
  footer.foot .venue{ font-family:var(--display); font-style:normal; color:var(--navy);
    font-size:clamp(20px,3.4vw,28px); letter-spacing:.04em; margin-bottom:6px; }

  /* floating controls (music + share + top) */
  .fabs{ position:fixed; right:14px; bottom:14px; z-index:40; display:flex; flex-direction:column; gap:10px; }
  .fab{ width:46px; height:46px; border-radius:50%; border:1px solid var(--gold);
    background:var(--navy); color:var(--gold2); display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:0 10px 26px -10px rgba(15,42,74,.7); transition:all .2s ease; }
  .fab:hover{ background:var(--navy2); transform:translateY(-2px); }
  .fab svg{ width:20px; height:20px; }
  .fab.hidden{ display:none; }

  /* lightbox */
  .lightbox{ position:fixed; inset:0; z-index:60; background:rgba(8,18,32,.94);
    display:none; align-items:center; justify-content:center; }
  .lightbox.on{ display:flex; }
  .lightbox img{ max-width:92vw; max-height:86vh; border-radius:10px; box-shadow:0 30px 80px rgba(0,0,0,.6); }
  .lb-btn{ position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.1);
    border:1px solid rgba(216,179,85,.5); color:#fff; width:52px; height:52px; border-radius:50%;
    font-size:26px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .lb-prev{ left:16px; } .lb-next{ right:16px; }
  .lb-close{ position:absolute; top:16px; right:18px; background:none; border:0; color:#fff;
    font-size:34px; cursor:pointer; line-height:1; }
  .lb-count{ position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    color:var(--gold2); font-family:var(--sans); letter-spacing:.16em; font-size:13px; }
  @media (max-width:560px){ .lb-btn{ width:42px; height:42px; font-size:22px; } }

  .hidden{ display:none !important; }
  .loading{ min-height:100svh; display:flex; align-items:center; justify-content:center;
    color:var(--gold2); font-family:var(--serif); font-style:italic; font-size:20px;
    background:linear-gradient(165deg,#0c2340,#0f2a4a); }
  .spin{ width:30px; height:30px; border:3px solid rgba(216,179,85,.3); border-top-color:var(--gold2);
    border-radius:50%; animation:sp 1s linear infinite; margin-right:14px; }
  @keyframes sp{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="petals" id="petals" aria-hidden="true"></div>

<!-- boot loader -->
<div class="loading" id="loading"><span class="spin"></span> Preparing your invitation…</div>

<div class="wrap hidden" id="page">

  <!-- ============================ HERO ============================ -->
  <header class="hero">
    <div class="arch" aria-hidden="true">
      <svg viewBox="0 0 720 460" fill="none" stroke="currentColor" stroke-width="1.4" style="color:var(--gold2)">
        <path d="M30 450 V150 Q30 40 150 30 Q360 14 360 14 Q360 14 570 30 Q690 40 690 150 V450"/>
        <path d="M52 450 V156 Q52 60 160 50 Q360 36 360 36 Q360 36 560 50 Q668 60 668 156 V450" opacity=".6"/>
        <circle cx="360" cy="150" r="5" fill="currentColor"/>
      </svg>
    </div>

    <div class="hero-inner">
      <svg class="ganesha" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M32 8c-3 0-5 2-5 4M32 8c3 0 5 2 5 4"/>
        <path d="M22 20c-4 1-8 5-8 11 0 8 8 14 18 14s18-6 18-14c0-6-4-10-8-11"/>
        <path d="M32 16c-6 0-10 4-10 9 0 4 3 7 6 8"/>
        <path d="M32 33c-2 0-4 2-4 5s2 8 4 8 4-5 4-8-2-5-4-5z"/>
        <path d="M14 31c-4 0-7 2-7 5M50 31c4 0 7 2 7 5"/>
        <circle cx="26" cy="24" r="1.4" fill="currentColor" stroke="none"/>
        <circle cx="38" cy="24" r="1.4" fill="currentColor" stroke="none"/>
      </svg>
      <div class="hero-deva deva" id="heroDeva"></div>
      <div class="blessing" id="heroBlessing"></div>
      <h1 class="names" id="heroNames"></h1>
      <div class="tagline" id="heroTagline"></div>
      <div class="hero-meta">
        <span id="heroDates"><b></b></span>
        <span class="dot"></span>
        <span id="heroVenue"><b></b></span>
      </div>
      <div class="greet hidden" id="greet"></div>

      <!-- countdown -->
      <div class="countdown" id="countdown" aria-label="countdown"></div>
    </div>

    <div class="scroll-hint" aria-hidden="true">
      <span>Scroll</span>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>
  </header>

  <!-- ========================== WELCOME ========================== -->
  <section class="band" id="welcomeBand">
    <div class="inner narrow">
      <div class="paper welcome reveal">
        <svg class="corner tl" viewBox="0 0 54 54" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4 50V22Q4 4 22 4h28"/><path d="M4 40V26Q4 12 26 12h14" opacity=".6"/></svg>
        <svg class="corner tr" viewBox="0 0 54 54" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4 50V22Q4 4 22 4h28"/><path d="M4 40V26Q4 12 26 12h14" opacity=".6"/></svg>
        <svg class="corner bl" viewBox="0 0 54 54" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4 50V22Q4 4 22 4h28"/><path d="M4 40V26Q4 12 26 12h14" opacity=".6"/></svg>

<script>
/* ======================= CONFIGURE ME ======================= */
var API_URL = "https://script.google.com/macros/s/AKfycbyoqhv0irhgNJtc1vadTXZsGxfC_UL2co1A9Ph-DLtj99jdrRtyFbDapNIrSt_Fi3iL/exec";
/* ============================================================ */

var $ = function (id){ return document.getElementById(id); };
var familyKey = new URLSearchParams(location.search).get("family") || "";
function esc(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
function nl2br(s){ return esc(s).replace(/\n/g,"<br>"); }

/* ---------- decorative particles ---------- */
(function(){
  var box = $("petals"); if(!box) return;
  var glyphs = ["✦","✿","❁","·","✧","❀"];
  for(var i=0;i<16;i++){
    var p=document.createElement("span"); p.className="petal"; p.textContent=glyphs[i%glyphs.length];
    p.style.left=((i*6.7+3)%100)+"vw";
    p.style.fontSize=(11+(i%5)*4)+"px";
    p.style.animationDuration=(15+(i%6)*2.4)+"s";
    p.style.animationDelay="-"+((i%8)*1.7)+"s";
    box.appendChild(p);
  }
})();

/* ---------- reveal-on-scroll ---------- */
function armReveals(){
  var els = document.querySelectorAll(".reveal");
  if(!("IntersectionObserver" in window)){ els.forEach(function(e){ e.classList.add("in"); }); return; }
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
  }, { threshold:.14, rootMargin:"0px 0px -8% 0px" });
  els.forEach(function(e){ io.observe(e); });
}

/* ---------- fetch feed ---------- */
function boot(){
  if(API_URL.indexOf("PASTE_")===0){ fail("This page isn't configured yet."); return; }
  var url = API_URL + "?page=home" + (familyKey ? "&family="+encodeURIComponent(familyKey) : "");
  fetch(url).then(function(r){ return r.json(); })
    .then(function(d){ if(!d||!d.ok){ fail("We couldn't load the invitation."); return; } render(d); })
    .catch(function(){ fail("Network error — please refresh."); });
}
function fail(m){ $("loading").innerHTML = esc(m); }

/* ---------- render ---------- */
function render(d){
  var w = d.website || {};
  var media = d.media || { photos:[], video:null, mapUrl:"", others:[] };

  // hero
  setText("heroDeva", w.hero_devanagari); toggle("heroDeva", w.hero_devanagari);
  setText("heroBlessing", w.hero_blessing);
  $("heroNames").innerHTML = fancyNames(w.hero_names || "Garima & Sagar");
  setText("heroTagline", w.hero_tagline);
  setB("heroDates", w.dates); setB("heroVenue", w.venue);
  document.title = (w.hero_names || "Wedding") + " — " + (w.dates || "");

  if(d.personalised && d.surname){
    $("greet").innerHTML = "With love, we welcome the <b>"+esc(d.surname)+" Family</b>";
    $("greet").classList.remove("hidden");
  }

  startCountdown(w.countdown_date);

  // welcome
  setText("welcomeHeading", w.welcome_heading || "With the blessings of our families");
  var paras = [w.welcome_para1, w.welcome_para2, w.welcome_para3].filter(nonEmpty);
  $("welcomeParas").innerHTML = paras.map(function(p){ return "<p>"+nl2br(p)+"</p>"; }).join("");
  if(nonEmpty(w.welcome_quote)) $("welcomeQuote").innerHTML = nl2br(w.welcome_quote);
  else hideEl("welcomeQuote");
  setB("wwDates", w.dates); setB("wwVenue", w.venue);

  // celebrations
  renderTimeline(collectIndexed(w, "celebration"));

  // video
  renderVideo(media.video);

  // gallery
  renderGallery(media.photos);

  // Q & A
  setText("qaHeading", w.qa_heading || "Everything You Need to Know");
  setText("qaIntro", w.qa_intro);
  renderQA(w, media.mapUrl);

  // contact
  setText("contactHeading", w.contact_heading || "Who should I contact?");
  setText("contactIntro", w.contact_intro);
  renderContacts(w);

  // CTA
  renderCTA(d);

  // closing + footer
  if(nonEmpty(w.closing_message)) $("closingMsg").innerHTML = "“"+nl2br(w.closing_message)+"”";
  else hideSection("closingBand");
  setText("footVenue", w.venue); setText("footDates", w.dates);

  // controls
  setupShare(w);
  setupMusic(w.music_url);

  // reveal
  $("loading").classList.add("hidden");
  $("page").classList.remove("hidden");
  armReveals();
  setupTopFab();
  setupLightbox();
}

/* ---------- helpers ---------- */
function nonEmpty(v){ return v!=null && String(v).trim()!==""; }
function setText(id,v){ var e=$(id); if(e) e.textContent = nonEmpty(v)? v : ""; }
function setB(id,v){ var e=$(id); if(!e) return; var b=e.querySelector("b"); if(b) b.textContent = nonEmpty(v)? v : ""; }
function toggle(id,v){ var e=$(id); if(e) e.classList.toggle("hidden", !nonEmpty(v)); }
function hideEl(id){ var e=$(id); if(e) e.classList.add("hidden"); }
function hideSection(id){ var e=$(id); if(e) e.classList.add("hidden"); }
/* "Garima & Sagar" -> big names stacked around a script ampersand. */
function fancyNames(s){
  var parts = String(s).split(/\s*&\s*/);
  if(parts.length===2) return esc(parts[0])+"<span class='amp'>&amp;</span>"+esc(parts[1]);
  return esc(s);
}
/* Gather celebration1, celebration2 … in order until a gap of 2 misses. */
function collectIndexed(w, prefix){
  var out=[], miss=0;
  for(var i=1;i<=40 && miss<3;i++){
    var v = w[prefix+i];
    if(nonEmpty(v)){ out.push(String(v)); miss=0; } else { miss++; }
  }
  return out;
}

/* ---------- countdown ---------- */
function startCountdown(dateStr){
  var box=$("countdown");
  var target = parseYMD(dateStr);
  if(!target){ box.classList.add("hidden"); return; }
  function tick(){
    var now = new Date();
    var diff = target.getTime() - now.getTime();
    if(diff <= 0){ box.innerHTML = "<div class='cd-done'>✦ The celebrations have begun ✦</div>"; return; }
    var d = Math.floor(diff/864e5);
    var h = Math.floor(diff%864e5/36e5);
    var m = Math.floor(diff%36e5/6e4);
    var s = Math.floor(diff%6e4/1e3);
    box.innerHTML = cdBox(d,"Days")+cdBox(h,"Hours")+cdBox(m,"Minutes")+cdBox(s,"Seconds");
  }
  tick(); setInterval(tick, 1000);
}
function cdBox(n,l){ return "<div class='cd-box'><div class='cd-num'>"+n+"</div><div class='cd-lbl'>"+l+"</div></div>"; }
function parseYMD(s){
  var m = String(s||"").match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(!m) return null;
  return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]), 0, 0, 0);
}

/* ---------- timeline ---------- */
var TL_ICONS = ["🌺","💍","🔴","🐘","🔥","✨","🎉","🪔"];
function renderTimeline(rows){
  if(!rows.length){ hideSection("timelineBand"); return; }
  var html = rows.map(function(row,i){
    var bits = row.split("|").map(function(x){ return x.trim(); });
    var name=bits[0]||"", time=bits[1]||"", date=bits[2]||"";
    var ic = TL_ICONS[i % TL_ICONS.length];
    var ics = makeIcs(name, date, time);
    var cal = ics ? "<a class='chip cal-btn' href='"+ics+"' download='"+esc(name)+".ics' title='Add to calendar'>"
      + "<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2'/><path d='M16 2v4M8 2v4M3 10h18'/></svg> Add</a>" : "";
    var when = [];
    if(time) when.push("<b>"+esc(time)+"</b>");
    if(date) when.push(esc(date));
    return "<div class='tl-item'>"
      + "<div class='tl-ic tl-c"+(i%5)+"'>"+ic+"</div>"
      + "<div class='tl-body'><div class='tl-name'>"+esc(name)+"</div>"
      + "<div class='tl-when'>"+when.join("<span>·</span>")+"</div></div>"
      + cal + "</div>";
  }).join("");
  $("timeline").innerHTML = html;
}
/* Build a minimal .ics data-URI for a ceremony. Best-effort: needs a parseable
   date; time is optional (all-day if absent). Purely client-side, no network. */
function makeIcs(name, dateStr, timeStr){
  var dt = parseFancyDate(dateStr);
  if(!dt) return "";
  var hm = parseClock(timeStr);
  var start, dtLine;
  if(hm){ start = new Date(dt.y, dt.m-1, dt.d, hm.h, hm.min); dtLine = "DTSTART:"+icsStamp(start)+"\nDTEND:"+icsStamp(new Date(start.getTime()+2*36e5)); }
  else  { dtLine = "DTSTART;VALUE=DATE:"+pad(dt.y)+pad2(dt.m)+pad2(dt.d); }
  var ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//wedding//EN\nBEGIN:VEVENT\n"
    + "SUMMARY:"+icsEsc(name)+"\n"+dtLine+"\nEND:VEVENT\nEND:VCALENDAR";
  return "data:text/calendar;charset=utf-8,"+encodeURIComponent(ics);
}
var MONTHS = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
function parseFancyDate(s){
  s=String(s||"");
  var iso=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/); if(iso) return {y:+iso[1],m:+iso[2],d:+iso[3]};
  var m=s.match(/(\d{1,2})\D+([A-Za-z]{3,})\D*(\d{4})/);
  if(m){ var mo=MONTHS[m[2].slice(0,3).toLowerCase()]; if(mo) return {y:+m[3],m:mo,d:+m[1]}; }
  return null;
}
function parseClock(s){
  var m=String(s||"").match(/(\d{1,2}):(\d{2})\s*(am|pm)?/i); if(!m) return null;
  var h=+m[1], min=+m[2], ap=(m[3]||"").toLowerCase();
  if(ap==="pm"&&h<12) h+=12; if(ap==="am"&&h===12) h=0;
  return {h:h,min:min};
}
function pad(n){ return String(n); } function pad2(n){ return (n<10?"0":"")+n; }
function icsStamp(dt){ return dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate())+"T"+pad2(dt.getHours())+pad2(dt.getMinutes())+"00"; }
function icsEsc(s){ return String(s).replace(/([,;\\])/g,"\\$1"); }

/* ---------- video ---------- */
function renderVideo(v){
  if(!v || !nonEmpty(v.url)){ hideSection("videoBand"); return; }
  var url = String(v.url).trim();
  var emb = youtubeEmbed(url);
  if(emb){ $("videoWrap").innerHTML = "<iframe src='"+esc(emb)+"' allow='accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture' allowfullscreen></iframe>"; }
  else if(/\.(mp4|webm|ogg)(\?|$)/i.test(url)){ $("videoWrap").innerHTML = "<video controls playsinline src='"+esc(url)+"'></video>"; }
  else { $("videoWrap").outerHTML = "<div style='text-align:center;margin-top:10px'><a class='btn btn-ghost' target='_blank' rel='noopener' href='"+esc(url)+"'>▶ Watch our invitation</a></div>"; }
}
function youtubeEmbed(u){
  var m = u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{6,})/);
  if(m) return "https://www.youtube.com/embed/"+m[1];
  var vm = u.match(/vimeo\.com\/(\d+)/); if(vm) return "https://player.vimeo.com/video/"+vm[1];
  return "";
}

/* ---------- gallery + lightbox ---------- */
var GAL = [];
function renderGallery(photos){
  GAL = (photos||[]).map(function(p){ return String(p.url).trim(); }).filter(Boolean);
  if(!GAL.length){ hideSection("galleryBand"); return; }
  $("gallery").innerHTML = GAL.map(function(u,i){
    return "<div class='gitem' data-i='"+i+"'><img loading='lazy' src='"+esc(u)+"' alt='Memory "+(i+1)+"' "
      + "onerror=\"this.parentNode.style.display='none'\"></div>";
  }).join("");
}
var lbIdx = 0;
function setupLightbox(){
  var lb=$("lightbox");
  $("gallery").addEventListener("click", function(e){
    var it = e.target.closest && e.target.closest(".gitem"); if(!it) return;
    openLb(Number(it.getAttribute("data-i"))||0);
  });
  $("lbClose").onclick = closeLb;
  $("lbPrev").onclick = function(){ openLb((lbIdx-1+GAL.length)%GAL.length); };
  $("lbNext").onclick = function(){ openLb((lbIdx+1)%GAL.length); };
  lb.addEventListener("click", function(e){ if(e.target===lb) closeLb(); });
  document.addEventListener("keydown", function(e){
    if(!lb.classList.contains("on")) return;
    if(e.key==="Escape") closeLb();
    else if(e.key==="ArrowLeft") $("lbPrev").click();
    else if(e.key==="ArrowRight") $("lbNext").click();
  });
}
function openLb(i){ lbIdx=i; $("lbImg").src=GAL[i]; $("lbCount").textContent=(i+1)+" / "+GAL.length; $("lightbox").classList.add("on"); }
function closeLb(){ $("lightbox").classList.remove("on"); $("lbImg").src=""; }

/* ---------- Q & A ---------- */
function renderQA(w, mapUrl){
  var items = [];
  var miss=0;
  for(var i=1;i<=30 && miss<3;i++){
    var q=w["qa"+i+"_q"], a=w["qa"+i+"_a"];
    if(nonEmpty(q)&&nonEmpty(a)){ items.push({q:q,a:a}); miss=0; } else { miss++; }
  }
  if(!items.length){ hideSection("qaBand"); return; }
  var html = items.map(function(it,i){
    var extra = "";
    // Append a "Get directions" button to the first answer that mentions the venue/map.
    if(mapUrl && /venue|reach|direction|map|address/i.test(it.q) && !window.__mapDone){
      window.__mapDone = true;
      extra = "<div style='margin-top:12px'><a class='chip' target='_blank' rel='noopener' href='"+esc(mapUrl)+"'>"
        + "<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0118 0z'/><circle cx='12' cy='10' r='3'/></svg> Get directions</a></div>";
    }
    return "<div class='qa-item'><button class='qa-q'>"+esc(it.q)+"</button>"
      + "<div class='qa-a'><div style='padding-top:16px'>"+nl2br(it.a)+extra+"</div></div></div>";
  }).join("");
  var box=$("qa"); box.innerHTML = html;
  // If no Q mentioned the venue but we DO have a map, add a standalone directions item.
  if(mapUrl && !window.__mapDone){
    var div=document.createElement("div"); div.className="qa-item";
    div.innerHTML = "<button class='qa-q'>How do I reach the venue?</button><div class='qa-a'><div style='padding-top:16px'>"
      + "<a class='chip' target='_blank' rel='noopener' href='"+esc(mapUrl)+"'>📍 Get directions</a></div></div>";
    box.appendChild(div);
  }
  box.addEventListener("click", function(e){
    var b = e.target.closest && e.target.closest(".qa-q"); if(!b) return;
    b.parentNode.classList.toggle("open");
  });
}

/* ---------- contacts ---------- */
function renderContacts(w){
  var people=[];
  for(var i=1;i<=8;i++){
    var n=w["contact"+i+"_name"]; if(!nonEmpty(n)) continue;
    people.push({ name:n, role:w["contact"+i+"_role"]||"", phone:w["contact"+i+"_phone"]||"" });
  }
  if(!people.length){ hideSection("contactBand"); return; }
  $("contacts").innerHTML = people.map(function(p){
    var digits = String(p.phone).replace(/[^0-9]/g,"");
    var call = nonEmpty(p.phone) ? "<a class='chip' href='tel:"+esc(p.phone.replace(/\s/g,''))+"'>"
      + "<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1 19.5 19.5 0 01-6-6A19.8 19.8 0 012.1 4.2 2 2 0 014 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.6a2 2 0 01-.5 2.1L8 9.6a16 16 0 006 6l1.2-1.1a2 2 0 012.1-.5c.8.3 1.7.5 2.6.6a2 2 0 011.7 2z'/></svg> Call</a>" : "";
    var wa = digits ? "<a class='chip' target='_blank' rel='noopener' href='https://wa.me/"+digits+"'>"
      + "<svg viewBox='0 0 24 24' fill='currentColor'><path d='M12 2a10 10 0 00-8.5 15.2L2 22l4.9-1.4A10 10 0 1012 2zm0 2a8 8 0 11-4.2 14.8l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 0112 4zm4.3 9.7c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.5 6.5 0 01-3.2-2.8c-.2-.4.2-.4.6-1.2.1-.2 0-.3 0-.5l-.7-1.6c-.2-.4-.4-.4-.5-.4h-.5a1 1 0 00-.7.3c-.3.3-1 1-1 2.4s1 2.8 1.2 3 2 3.1 4.9 4.3c1.8.8 2.5.8 3.4.7.5 0 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1z'/></svg> WhatsApp</a>" : "";
    return "<div class='card'><div class='cname'>"+esc(p.name)+"</div>"
      + (nonEmpty(p.role)?"<div class='crole'>"+esc(p.role)+"</div>":"<div class='crole'>&nbsp;</div>")
      + "<div class='cbtns'>"+call+wa+"</div></div>";
  }).join("");
}

/* ---------- CTA buttons ---------- */
function renderCTA(d){
  var q = familyKey ? "?family="+encodeURIComponent(familyKey) : "";
  var row=$("ctaRow"), html="";
  if(nonEmpty(d.rsvpUrl)) html += "<a class='btn btn-primary' href='"+esc(d.rsvpUrl+q)+"'>"
    + "<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 6L9 17l-5-5'/></svg> RSVP Now</a>";
  if(nonEmpty(d.travelUrl)) html += "<a class='btn btn-ghost' href='"+esc(d.travelUrl+q)+"'>"
    + "<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M17 2l4 4-4 4M3 11h18M7 22l-4-4 4-4M21 13H3'/></svg> Share Travel Plans</a>";
  if(!html){ hideSection("ctaBand"); return; }
  row.innerHTML = html;
}

/* ---------- share ---------- */
function setupShare(w){
  var btn=$("shareFab"); btn.classList.remove("hidden");
  btn.onclick = function(){
    var data = { title: (w.hero_names||"Our Wedding"), text: "You're invited! "+(w.hero_names||"")+" — "+(w.dates||""), url: location.href };
    if(navigator.share){ navigator.share(data).catch(function(){}); }
    else if(navigator.clipboard){ navigator.clipboard.writeText(location.href).then(function(){ toast("Invite link copied ✦"); }); }
    else { toast(location.href); }
  };
}
function toast(t){
  var el=document.createElement("div"); el.textContent=t;
  el.style.cssText="position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:80;background:var(--navy);color:#fff;padding:10px 18px;border-radius:999px;border:1px solid var(--gold);font-family:var(--sans);font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.4)";
  document.body.appendChild(el); setTimeout(function(){ el.remove(); }, 2600);
}

/* ---------- music (off by default; only shown if music_url set) ---------- */
function setupMusic(url){
  if(!nonEmpty(url)) return;
  var a=$("bgAudio"), btn=$("musicFab");
  a.src=String(url).trim(); a.volume=0.5;
  btn.classList.remove("hidden");
  var playing=false;
  btn.onclick = function(){
    if(playing){ a.pause(); playing=false; btn.style.color="var(--gold2)"; }
    else { a.play().then(function(){ playing=true; btn.style.color="#7fe0c3"; }).catch(function(){ toast("Tap again to play music"); }); }
  };
}

/* ---------- back-to-top ---------- */
function setupTopFab(){
  var btn=$("topFab");
  window.addEventListener("scroll", function(){ btn.classList.toggle("hidden", window.scrollY < 600); });
  btn.onclick = function(){ window.scrollTo({ top:0, behavior:"smooth" }); };
}

boot();
</script>
